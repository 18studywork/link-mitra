<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Link Mitra</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="screen">
  <div class="card login-card">
    <h1>🔗 Link Mitra</h1>
    <div class="password-row">
      <input type="password" id="passwordInput" placeholder="Enter Password" oninput="checkLogin()">
      <button class="eye-btn" onclick="togglePassword()">👁</button>
    </div>
    <button onclick="checkLogin()">Unlock Vault</button>
  </div>
</div>

<div id="appScreen" class="screen hidden">
  <div class="header">
    <h1>🔗 Link Mitra</h1>
    <button onclick="toggleSettings()">⚙️</button>
  </div>

  <div id="settingsPanel" class="card hidden">
    <input type="password" id="currentPass" placeholder="Current Password">
    <input type="password" id="newPass" placeholder="New Password">
    <input type="password" id="confirmPass" placeholder="Confirm Password">
    <button onclick="changePassword()">Save Password</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <input type="text" id="searchInput" placeholder="Search Links..." onkeyup="renderLinks()">
  </div>

  <div class="card">
    <input type="text" id="titleInput" placeholder="Title">
    <input type="url" id="urlInput" placeholder="URL">
    <textarea id="noteInput" placeholder="Note (optional)"></textarea>
    <button onclick="addLink()">Add Link</button>
  </div>

  <div class="toolbar">
    <span id="activeCount">0 Links</span>
    <button onclick="toggleBin()">🗑 Recycle Bin (<span id="binCount">0</span>)</button>
  </div>

  <div id="linksContainer"></div>

  <div id="binSection" class="hidden">
    <h2>Recycle Bin</h2>
    <div id="binContainer"></div>
  </div>

  <div id="selectionBar" class="hidden selection-bar">
    <button onclick="deleteSelected()">Delete Selected</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
