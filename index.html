<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Mitra</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">🔗</div>
    <h1>Link Mitra</h1>
    <p class="subtitle">Your Personal Link Vault</p>
    <div class="login-card">
      <h2>Unlock Vault</h2>
      <input type="password" id="pin" maxlength="6" placeholder="Enter 6 Digit PIN">
      <button onclick="unlockVault()">Unlock</button>
      <p id="message"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
